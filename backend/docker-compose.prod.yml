# ==========================================================================
# PRODUCTION / STAGING docker-compose для сервера 185.129.51.40
# ==========================================================================
# Отличия от dev-версии (docker-compose.yml):
#   • backend запускается через gunicorn (а не runserver) + прогоняет миграции;
#   • код НЕ монтируется с хоста (берётся из образа, собранного Dockerfile);
#   • внутренние сервисы (db, pgbouncer, redis) НЕ торчат наружу — только backend и minio;
#   • наружу открыты порты 8000 (API) и 9000/9001 (MinIO S3 + консоль).
#
# Запуск:  docker compose -f docker-compose.prod.yml up -d --build
# Логи:    docker compose -f docker-compose.prod.yml logs -f backend
# ==========================================================================

services:
  # База данных PostgreSQL (наружу порт НЕ открываем — доступ только внутри Docker-сети)
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  # PgBouncer — пул соединений (наружу порт НЕ открываем)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=1000
      - DEFAULT_POOL_SIZE=100
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -p 6432" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  # MinIO — S3-совместимое хранилище медиафайлов.
  # Порт 9000 нужен, чтобы мобильное приложение могло загружать картинки/видео.
  minio:
    image: minio/minio:latest
    container_name: minio_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API (публичные URL медиа: http://185.129.51.40:9000/...)
      - "9001:9001"   # Веб-консоль MinIO (по возможности закрой файрволом — см. DEPLOY.md)
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # Одноразовый init: создаёт бакет и открывает публичный read-доступ к медиа
  createbuckets:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID} $${AWS_SECRET_ACCESS_KEY} &&
        mc mb --ignore-existing local/$${AWS_STORAGE_BUCKET_NAME} &&
        mc anonymous set download local/$${AWS_STORAGE_BUCKET_NAME} &&
        echo 'Bucket ready.' && exit 0
      "
    env_file:
      - .env

  # Redis — кэш Django + брокер Celery (наружу порт НЕ открываем)
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n \"$${REDIS_PASSWORD:-}\" ]; then
          redis-server --requirepass \"$${REDIS_PASSWORD}\"
        else
          redis-server
        fi
      "
    healthcheck:
      test: >
        sh -c "
          if [ -n \"$${REDIS_PASSWORD:-}\" ]; then
            redis-cli -a \"$${REDIS_PASSWORD}\" ping
          else
            redis-cli ping
          fi
        "
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  # Основное Django-приложение (gunicorn).
  # Перед стартом прогоняем миграции. Код берётся из образа (без монтирования с хоста).
  backend:
    build: .
    container_name: django_backend
    restart: unless-stopped
    volumes:
      - ./logs:/app/backend/logs   # логи наружу, на хост
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120
             --access-logfile -
             --error-logfile -"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # Celery worker — общие фоновые задачи (пуши, напоминания и т.д.)
  worker:
    build: .
    container_name: celery_worker
    restart: unless-stopped
    command: >
      celery -A config worker
      --loglevel=info
      --queues=celery
      --concurrency=4
      --max-tasks-per-child=1000
      --time-limit=300
      --soft-time-limit=270
    volumes:
      - ./logs:/app/backend/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  # Celery video worker — тяжёлое FFmpeg-транскодирование видео (отдельная очередь)
  video-worker:
    build: .
    container_name: celery_video_worker
    restart: unless-stopped
    command: >
      celery -A config worker
      --loglevel=info
      --queues=video
      --concurrency=2
      --max-tasks-per-child=50
      --time-limit=960
      --soft-time-limit=900
    volumes:
      - ./logs:/app/backend/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'

  # Celery beat — планировщик периодических задач
  beat:
    build: .
    container_name: celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --pidfile=/tmp/celerybeat.pid
    volumes:
      - ./logs:/app/backend/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

volumes:
  pg_data:
  minio_data:

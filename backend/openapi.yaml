openapi: 3.0.3
info:
  title: Panno Restaurant API
  version: 1.0.0
  description: |-
    REST API для мобильного приложения ресторана Panno.

    ## Авторизация
    Большинство эндпоинтов требуют JWT Bearer токен. Получить его можно через:
    1. `POST /api/users/auth/request-sms/` — запросить SMS с кодом
    2. `POST /api/users/auth/verify-sms/` — подтвердить код и получить токены

    Далее передавайте заголовок: `Authorization: Bearer <access_token>`
  contact:
    name: Panno Dev Team
paths:
  /api/v1/users/auth/token/refresh/:
    post:
      operationId: v1_users_auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/users/auth/request-sms/:
    post:
      operationId: v1_users_auth_request_sms_create
      description: |-
        Отправляет на указанный номер телефона 4-значный OTP-код через SMS.

        Код действителен **3 минуты** и хранится в Redis.

        **Лимит:** 3 запроса в минуту с одного IP-адреса и 5 запросов за 10 минут на один номер телефона.
      summary: Запрос SMS с кодом подтверждения
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestSMSRequest'
            examples:
              Запрос:
                value:
                  phone: '+77001234567'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RequestSMSRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RequestSMSRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: SMS успешно отправлен
        '400':
          description: Ошибка валидации — неверный формат номера телефона
        '429':
          description: Превышен лимит запросов (3/мин с одного IP или 5/10мин на номер)
        '500':
          description: Ошибка сервера при отправке SMS
  /api/v1/users/auth/verify-sms/:
    post:
      operationId: v1_users_auth_verify_sms_create
      description: |-
        Проверяет OTP-код из SMS. При успехе возвращает пару JWT-токенов.

        Если пользователь с таким номером ещё не существует — он создаётся автоматически.

        **Лимит:** 5 попыток в минуту с одного IP-адреса.

        Полученный `access` токен передавайте в заголовке: `Authorization: Bearer <access>`
      summary: Подтверждение SMS-кода и получение JWT-токенов
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifySMSRequest'
            examples:
              Запрос:
                value:
                  phone: '+77001234567'
                  otp: '4823'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifySMSRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifySMSRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Авторизация успешна
        '400':
          description: Неверный или просроченный код, либо ошибка валидации
        '429':
          description: Превышен лимит попыток (5/мин с одного IP)
  /api/v1/users/auth/logout/:
    post:
      operationId: v1_users_auth_logout_create
      description: |-
        Добавляет refresh-токен в blacklist, делая его недействительным.

        После logout клиент должен удалить оба токена (`access` и `refresh`) из локального хранилища и перенаправить пользователя на экран входа.

        **Важно:** access-токен продолжает работать до истечения своего TTL (30 мин в проде). Blacklist инвалидирует только возможность получить новый access через refresh.
      summary: Выход из системы (отзыв refresh-токена)
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            examples:
              Запрос:
                value:
                  refresh: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.<payload>.<signature>
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Успешный logout, тело пустое
        '400':
          description: Токен невалиден или уже отозван
        '401':
          description: Токен не передан или недействителен
  /api/v1/users/profile/:
    get:
      operationId: v1_users_profile_retrieve
      description: 'Возвращает данные авторизованного пользователя: id, номер телефона,
        имя, фамилию, пол, email и дату рождения.'
      summary: Получить профиль текущего пользователя
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
        '401':
          description: Токен не передан или недействителен
    patch:
      operationId: v1_users_profile_partial_update
      description: |-
        Частичное обновление профиля (PATCH). Можно передавать только изменяемые поля.

        `id` и `phone` — только для чтения, изменить их через этот эндпоинт нельзя.
      summary: Обновить профиль текущего пользователя
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
            examples:
              ОбновлениеИмени:
                value:
                  first_name: Алихан
                  last_name: Сейткали
                summary: Обновление имени
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
        '400':
          description: Ошибка валидации
        '401':
          description: Токен не передан или недействителен
  /api/v1/users/account/:
    delete:
      operationId: v1_users_account_destroy
      description: |-
        Безвозвратно удаляет учётную запись и связанные персональные данные.

        После успешного ответа клиент должен очистить локальные JWT-токены и показать экран неавторизованного пользователя.

        Учётные записи персонала (`is_staff`) через приложение удалить нельзя.
      summary: Удалить аккаунт текущего пользователя
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Аккаунт удалён, тело пустое
        '401':
          description: Токен не передан или недействителен
        '403':
          description: Удаление запрещено (например, staff-аккаунт)
  /api/v1/menu/categories/:
    get:
      operationId: v1_menu_categories_list
      description: Возвращает все категории блюд, отсортированные по полю `order`.
      summary: Список категорий меню
      tags:
      - Menu
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
          description: ''
  /api/v1/menu/tags/:
    get:
      operationId: v1_menu_tags_list
      description: Возвращает все теги блюд, отсортированные по имени.
      summary: Список тегов меню
      tags:
      - Menu
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tag'
          description: ''
  /api/v1/menu/allergens/:
    get:
      operationId: v1_menu_allergens_list
      description: Возвращает все аллергены, отсортированные по имени.
      summary: Список аллергенов
      tags:
      - Menu
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Allergen'
          description: ''
  /api/v1/menu/dishes/:
    get:
      operationId: v1_menu_dishes_list
      description: |-
        Возвращает активные блюда меню с вложенными данными категории, тегов и аллергенов.

        Поддерживает фильтрацию по категории и тегу, а также пагинацию.

        По умолчанию возвращает **5 блюд** на страницу (формат видеоленты). Максимум — 20.
      summary: Список блюд
      parameters:
      - in: query
        name: category_id
        schema:
          type: integer
        description: Фильтр по ID категории
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество блюд на странице (по умолчанию 5, максимум 20)
      - in: query
        name: search
        schema:
          type: string
        description: Поиск по названию и описанию блюда (регистронезависимый)
      - in: query
        name: tag_ids
        schema:
          type: string
        description: 'Фильтр по нескольким тегам (ID через запятую). Пример: ?tag_ids=1,2,3'
      tags:
      - Menu
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDishList'
          description: ''
  /api/v1/menu/feed/:
    get:
      operationId: v1_menu_feed_list
      description: |-
        Возвращает только активные блюда с готовым видео (`video_status=ready`).

        Использует курсорную пагинацию — передайте параметр `cursor` из поля `next` предыдущего ответа для получения следующей порции.
      summary: Видеолента блюд
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      tags:
      - Menu
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDishList'
          description: ''
  /api/v1/menu/staff/dishes/:
    get:
      operationId: v1_menu_staff_dishes_list
      description: CRUD блюд для staff/admin. Видит все блюда включая неактивные.
      tags:
      - 'Staff: Menu'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffDish'
          description: ''
    post:
      operationId: v1_menu_staff_dishes_create
      description: CRUD блюд для staff/admin. Видит все блюда включая неактивные.
      tags:
      - 'Staff: Menu'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffDishRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffDishRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/StaffDishRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDish'
          description: ''
  /api/v1/menu/staff/dishes/{id}/:
    patch:
      operationId: v1_menu_staff_dishes_partial_update
      description: CRUD блюд для staff/admin. Видит все блюда включая неактивные.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Блюдо.
        required: true
      tags:
      - 'Staff: Menu'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStaffDishRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStaffDishRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedStaffDishRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDish'
          description: ''
    get:
      operationId: v1_menu_staff_dishes_retrieve
      description: CRUD блюд для staff/admin. Видит все блюда включая неактивные.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Блюдо.
        required: true
      tags:
      - 'Staff: Menu'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDish'
          description: ''
    put:
      operationId: v1_menu_staff_dishes_update
      description: CRUD блюд для staff/admin. Видит все блюда включая неактивные.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Блюдо.
        required: true
      tags:
      - 'Staff: Menu'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffDishRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffDishRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/StaffDishRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDish'
          description: ''
    delete:
      operationId: v1_menu_staff_dishes_destroy
      description: CRUD блюд для staff/admin. Видит все блюда включая неактивные.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Блюдо.
        required: true
      tags:
      - 'Staff: Menu'
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/events/upcoming/:
    get:
      operationId: v1_events_upcoming_list
      description: Возвращает активные мероприятия с датой проведения **в будущем**,
        отсортированные по ближайшей дате.
      summary: Список предстоящих мероприятий
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество элементов на странице (по умолчанию 20, максимум 100)
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
          description: ''
  /api/v1/events/archived/:
    get:
      operationId: v1_events_archived_list
      description: Возвращает активные мероприятия с датой проведения **в прошлом**,
        отсортированные от самого свежего к старому.
      summary: Архив прошедших мероприятий
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество элементов на странице (по умолчанию 20, максимум 100)
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
          description: ''
  /api/v1/events/news/:
    get:
      operationId: v1_events_news_list
      description: Возвращает новости ресторана, отсортированные от самой свежей к
        старой.
      summary: Список новостей
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество элементов на странице (по умолчанию 20, максимум 100)
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNewsList'
          description: ''
  /api/v1/events/reservations/create/:
    post:
      operationId: v1_events_reservations_create_create
      description: |-
        Создаёт запись текущего авторизованного пользователя на выбранное мероприятие.

        Один пользователь не может записаться на одно мероприятие дважды — повторный запрос вернёт ошибку 400.
      summary: Записаться на мероприятие
      tags:
      - Events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventReservationRequest'
            examples:
              ЗаписьНаМероприятие:
                value:
                  event: 3
                  guests_count: 2
                summary: Запись на мероприятие
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventReservationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventReservationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventReservation'
          description: ''
        '400':
          description: Ошибка валидации или повторная запись на то же мероприятие
        '401':
          description: Токен не передан или недействителен
  /api/v1/events/reservations/my/:
    get:
      operationId: v1_events_reservations_my_list
      description: Возвращает все записи на мероприятия текущего авторизованного пользователя
        с вложенными деталями каждого мероприятия (`event_details`).
      summary: Мои записи на мероприятия
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество элементов на странице (по умолчанию 20, максимум 100)
      tags:
      - Events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventReservationList'
          description: ''
        '401':
          description: Токен не передан или недействителен
  /api/v1/events/{event_id}/photo-report/:
    get:
      operationId: v1_events_photo_report_list
      description: Возвращает список фотографий фотоотчёта для указанного мероприятия.
        Доступно только для прошедших событий (date_time в прошлом). Если мероприятие
        ещё не прошло или фотоотчёт не загружен — возвращается пустой список.
      summary: Фотоотчёт прошедшего мероприятия
      parameters:
      - in: path
        name: event_id
        schema:
          type: integer
        description: ID мероприятия
        required: true
      tags:
      - Events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventPhotoReport'
          description: ''
  /api/v1/events/admin/events/:
    get:
      operationId: v1_events_admin_events_list
      tags:
      - 'Staff: Events'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffEvent'
          description: ''
    post:
      operationId: v1_events_admin_events_create
      tags:
      - 'Staff: Events'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffEventRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffEventRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/StaffEventRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffEvent'
          description: ''
  /api/v1/events/admin/events/{id}/:
    patch:
      operationId: v1_events_admin_events_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Мероприятие.
        required: true
      tags:
      - 'Staff: Events'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedStaffEventRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedStaffEventRequest'

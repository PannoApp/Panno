      description: |-
        Возвращает фотографии интерьера ресторана, сгруппированные по зонам.

        Доступен без авторизации.

        **Зоны:** `main_hall` — Главный зал, `bar` — Бар, `private` — Приватная комната, `terrace` — Терраса, `other` — Другое.
      summary: Галерея фотографий интерьера
      tags:
      - Core
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InteriorPhoto'
          description: ''
  /api/v1/core/health/:
    get:
      operationId: v1_core_health_retrieve
      description: Возвращает статус DB и Redis. Не требует авторизации.
      tags:
      - v1
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/notifications/device/register/:
    post:
      operationId: v1_notifications_device_register_create
      description: |-
        Регистрирует FCM-токен мобильного устройства для отправки push-уведомлений.

        Если токен уже существует в базе — он перепривязывается к текущему пользователю (полезно при смене аккаунта на одном устройстве).

        Вызывать при каждом входе в приложение и при обновлении FCM-токена Firebase.
      summary: Зарегистрировать или обновить FCM-токен устройства
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDeviceRequest'
            examples:
              РегистрацияУстройства:
                value:
                  fcm_token: dGhpcyBpcyBhIHNhbXBsZSBmY20gdG9rZW4...
                summary: Регистрация устройства
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserDeviceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserDeviceRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          description: Устройство успешно зарегистрировано
        '200':
          description: Токен уже существует, перепривязан к текущему пользователю
        '400':
          description: Ошибка валидации — токен не передан или пустой
        '401':
          description: Токен не передан или недействителен
  /api/v1/notifications/bulk-push/:
    post:
      operationId: v1_notifications_bulk_push_create
      description: |-
        Отправляет push выбранному сегменту пользователей. Доступен только персоналу (`is_staff=True`).

        **Сегменты:**
        - `all` — все пользователи с FCM-устройствами
        - `last_visit_days` — посещали ресторан в последние N дней (по бронированиям со статусом `completed`)
        - `participated_in_event` — участники конкретного мероприятия
        - `registered_after` — зарегистрированные после указанной даты
      summary: Массовая рассылка push-уведомлений
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkPushRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkPushRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkPushRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          description: Рассылка поставлена в очередь
        '400':
          description: Ошибка валидации
        '403':
          description: Нет прав (требуется is_staff)
  /api/v1/notifications/send-push-via-bot/:
    post:
      operationId: v1_notifications_send_push_via_bot_create
      description: Принимает запрос от Telegram-бота для массовой рассылки push-уведомлений
        всем зарегистрированным устройствам.
      summary: Рассылка push-уведомления через Telegram-бот
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendPushViaBotRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendPushViaBotRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendPushViaBotRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '202':
          description: Рассылка успешно поставлена в очередь
        '400':
          description: Ошибка валидации данных
        '403':
          description: Доступ запрещен (неверный токен вебхука или менеджер не найден/не
            имеет прав)
components:
  schemas:
    Allergen:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название аллергена
          maxLength: 100
      required:
      - id
      - name
    AppVersion:
      type: object
      properties:
        platform:
          allOf:
          - $ref: '#/components/schemas/PlatformEnum'
          title: Платформа
        min_version:
          type: string
          title: Минимальная версия (force update)
          maxLength: 20
        latest_version:
          type: string
          title: Последняя версия (optional update)
          maxLength: 20
        store_url:
          type: string
          format: uri
          title: Ссылка на магазин
          maxLength: 200
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - latest_version
      - min_version
      - platform
      - updated_at
    AvailabilityResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        guests_count:
          type: integer
        slots:
          type: array
          items:
            $ref: '#/components/schemas/AvailabilitySlot'
      required:
      - date
      - guests_count
      - slots
    AvailabilitySlot:
      type: object
      description: Только для схемы ответа (drf-spectacular) — сам ответ отдаётся
        как plain dict.
      properties:
        time:
          type: string
        is_free:
          type: boolean
        tables_count:
          type: integer
      required:
      - is_free
      - tables_count
      - time
    BlankEnum:
      enum:
      - ''
    BulkPushRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        body:
          type: string
          minLength: 1
        data:
          type: object
          additionalProperties:
            type: string
            minLength: 1
        category:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CategoryEnum'
          - $ref: '#/components/schemas/NullEnum'
        segment:
          allOf:
          - $ref: '#/components/schemas/SegmentEnum'
          default: all
        last_visit_days:
          type: integer
          minimum: 1
          description: Только пользователи, чьи брони были в последние N дней
        event_id:
          type: integer
          description: Только участники указанного мероприятия
        registered_after:
          type: string
          format: date
          description: Только пользователи, зарегистрированные после даты (YYYY-MM-DD)
      required:
      - body
      - title
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 100
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Порядок отображения
      required:
      - id
      - name
    CategoryEnum:
      enum:
      - events
      - promotions
      - closed_events
      type: string
    Dish:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название блюда
          maxLength: 200
        description:
          type: string
          title: Описание
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Цена
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        allergens:
          type: array
          items:
            $ref: '#/components/schemas/Allergen'
          readOnly: true
        image:
          type: string
          readOnly: true
        video_url:
          type: string
          readOnly: true
        video_status:
          $ref: '#/components/schemas/VideoStatusEnum'
        weight:
          type: integer
          maximum: 2147483647
          minimum: 0
          nullable: true
          title: Вес (г)
        story:
          type: string
          title: История блюда
        is_active:
          type: boolean
          title: Активно
      required:
      - allergens
      - category
      - id
      - image
      - name
      - price
      - tags
      - video_url
    Event:
      type: object
      description: Сериализатор для модели мероприятий.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: Заголовок мероприятия
          maxLength: 255
        description:
          type: string
          title: Описание
        date_time:
          type: string
          format: date-time
          title: Дата и время проведения
        image:
          type: string
          readOnly: true
        format:
          allOf:
          - $ref: '#/components/schemas/FormatEnum'
          title: Формат
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          nullable: true
          title: Цена входа
        is_active:
          type: boolean
          title: Активно
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        has_photo_report:
          type: string
          readOnly: true
        max_places:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Количество разрешенных мест
          description: 0 означает отсутствие ограничений на количество мест
        occupied_places:
          type: string
          readOnly: true
      required:
      - created_at
      - date_time
      - description
      - has_photo_report
      - id
      - image
      - occupied_places
      - title
    EventPhotoReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image:
          type: string
          readOnly: true
        order:
          type: integer
          maximum: 32767
          minimum: 0
          title: Порядок отображения
      required:
      - id
      - image
    EventRequest:
      type: object

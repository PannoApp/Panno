  /api/v1/bookings/:
    get:
      operationId: v1_bookings_list
      description: Возвращает все бронирования текущего авторизованного пользователя,
        отсортированные по дате и времени визита (ближайшие первыми).
      summary: Список моих бронирований столов
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: Номер страницы
      - in: query
        name: page_size
        schema:
          type: integer
        description: Количество записей на странице (по умолчанию 20, максимум 100)
      tags:
      - Bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTableBookingList'
          description: ''
        '401':
          description: Токен не передан или недействителен
    post:
      operationId: v1_bookings_create
      description: |-
        Создаёт новое бронирование стола для текущего авторизованного пользователя.

        Статус нового бронирования автоматически устанавливается в `pending` (ожидает подтверждения).

        **Ограничения:** количество гостей от 1 до 50.
      summary: Создать бронирование стола
      tags:
      - Bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableBookingRequest'
            examples:
              БронированиеНа4Гостей:
                value:
                  guest_name: Алихан Сейткали
                  date: '2026-06-15'
                  time: '19:30:00'
                  guests_count: 4
                  comment: Аллергия на орехи, нужен детский стул
                summary: Бронирование на 4 гостей
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TableBookingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TableBookingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableBooking'
          description: ''
        '400':
          description: Ошибка валидации входных данных
        '401':
          description: Токен не передан или недействителен
  /api/v1/bookings/availability/:
    get:
      operationId: v1_bookings_availability_retrieve
      description: |-
        Возвращает список получасовых слотов на указанную дату с флагом занятости для всего ресторана (без разбивки по залам).

        Результат кешируется на 60 секунд. Недоступность Remarked не блокирует создание брони — эндпоинт лишь подсказка для UI, при 503 клиент может продолжить бронирование без проверки.
      summary: Проверить доступность на дату
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Дата визита, YYYY-MM-DD
        required: true
      - in: query
        name: guests
        schema:
          type: integer
        description: Количество гостей (1–50)
        required: true
      tags:
      - Bookings
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
              examples:
                ПримерОтвета:
                  value:
                    date: '2026-07-15'
                    guests_count: 2
                    slots:
                    - time: '12:00:00'
                      is_free: false
                      tables_count: 0
                    - time: '14:00:00'
                      is_free: true
                      tables_count: 13
                  summary: Пример ответа
          description: ''
        '400':
          description: Ошибка валидации параметров
        '503':
          description: Проверка занятости временно недоступна (Remarked не отвечает)
  /api/v1/core/info/:
    get:
      operationId: v1_core_info_retrieve
      description: |-
        Возвращает статическую публичную информацию о ресторане: адрес, часы работы и ссылки на 3D-тур и карту 2GIS.

        Доступен без авторизации.
      summary: Информация о ресторане
      tags:
      - Core
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantInfo'
              examples:
                Пример:
                  value:
                    address: г. Алматы, ул. Панфилова, 98
                    working_hours: 'Пн–Вс: 12:00–00:00'
                    tour_link: https://tour.example.com/panno
                    twogis_link: https://2gis.kz/almaty/firm/123456789
          description: Информация о ресторане
  /api/v1/core/app-version/:
    get:
      operationId: v1_core_app_version_retrieve
      description: |-
        GET /api/v1/core/app-version/?platform=ios|android

        Возвращает минимальную и последнюю версию приложения для заданной платформы.
        Доступен без авторизации.
      tags:

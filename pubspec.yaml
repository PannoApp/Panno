name: piligrim
description: "PILIGRIM — духовно-гастрономическое путешествие. Кухня свободы и традиций."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  sensors_plus: ^7.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  # HTTP-клиент с поддержкой JWT-интерцептора и retry
  dio: ^5.7.0
  # Безопасное хранение JWT-токенов (keychain/keystore)
  flutter_secure_storage: ^9.2.2
  # State management — минимальная надстройка над InheritedNotifier
  provider: ^6.1.2
  # Firebase: базовая инициализация
  firebase_core: ^3.6.0
  # Firebase: FCM push-уведомления (бэкенд уже использует FCM)
  firebase_messaging: ^15.1.3
  # Воспроизведение видео для ленты блюд
  video_player: ^2.9.1
  # Кэширование видеофайлов на диске (избегаем повторных сетевых запросов)
  flutter_cache_manager: ^3.4.1
  # Кэшированная загрузка изображений из API с плейсхолдерами
  cached_network_image: ^3.4.1
  # Генерация UUID для Idempotency-Key в booking/event reservation
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Мокирование Dio и сервисов без кодогенерации
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    # Все SVG и интерьерные PNG из одной папки (в т.ч. interior_hero_4…21).
    - assets/images/

  fonts:
    - family: MuseoSans
      fonts:
        - asset: assets/fonts/MuseoSans-300.ttf
          weight: 300
        - asset: assets/fonts/MuseoSans-700.ttf
          weight: 700

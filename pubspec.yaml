name: piligrim
description: "PILIGRIM — духовно-гастрономическое путешествие. Кухня свободы и традиций."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  sensors_plus: ^7.0.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    # Все SVG и интерьерные PNG из одной папки (в т.ч. interior_hero_4…21).
    - assets/images/

  fonts:
    - family: MuseoSans
      fonts:
        - asset: assets/fonts/MuseoSans-300.ttf
          weight: 300
        - asset: assets/fonts/MuseoSans-700.ttf
          weight: 700
